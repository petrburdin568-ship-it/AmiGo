<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmiGo — Мессенджер по интересам</title>
    <meta name="description" content="Локальный MVP: комнаты по интересам + чат в реальном времени." />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg"></div>

    <main class="container">
      <header class="topbar">
        <div class="brand">
          <div class="logo">A</div>
          <div class="brandText">
            <div class="title">AmiGo</div>
            <div class="subtitle">мессенджер по интересам (MVP)</div>
          </div>
        </div>
        <div class="pill" id="connPill">OFFLINE</div>
      </header>

      <section class="hero">
        <div class="nowPlaying">
          <div class="label">Комната</div>
          <div class="song" id="roomTitle">—</div>
          <div class="meta">
            <span class="dot" id="presenceDot"></span>
            <span id="presenceText">0 онлайн</span>
          </div>
        </div>

        <div class="glowCard">
          <div class="stat">
            <div class="statValue" id="msgCount">0</div>
            <div class="statLabel">сообщений</div>
          </div>
          <div class="divider"></div>
          <div class="stat">
            <div class="statValue" id="myNameShort">—</div>
            <div class="statLabel">твой ник</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panelHeader">
          <div class="panelTitle">Интересы</div>
          <div class="panelHint">выбери комнату или создай свою</div>
        </div>

        <div class="roomsBar">
          <div class="chips" id="roomsChips"></div>
          <form class="roomCreate" id="roomCreateForm">
            <input
              class="input"
              id="roomCreateInput"
              type="text"
              maxlength="60"
              placeholder="Новая комната (например, Путешествия)"
              required
            />
            <button class="btn small" type="submit">
              <span class="btnGlow"></span>
              Создать
            </button>
          </form>
        </div>

        <div class="panelHeader" style="margin-top: 12px">
          <div class="panelTitle">Чат</div>
          <div class="panelHint">обновляется мгновенно</div>
        </div>

        <div class="composer">
          <form id="msgForm" class="composerForm">
            <div class="row">
              <label class="field">
                <span class="fieldLabel">Ник</span>
                <input id="userInput" class="input" type="text" maxlength="80" required />
              </label>
              <div class="field grow">
                <span class="fieldLabel">Сообщение</span>
                <input
                  id="textInput"
                  class="input"
                  type="text"
                  placeholder="Напиши что-нибудь…"
                  maxlength="2000"
                  required
                />
              </div>
            </div>
            <div class="actions">
              <button class="btn" type="submit" id="sendBtn">
                <span class="btnGlow"></span>
                Отправить
              </button>
              <div class="tiny" id="errorBox"></div>
            </div>
          </form>
        </div>

        <div class="list" id="messagesList">
          <div class="skeleton" id="loadingSkeleton">
            <div class="shimmer"></div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <div class="footerText">FastAPI + WebSocket + SQLite • локальный MVP</div>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
